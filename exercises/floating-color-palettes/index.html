<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating color palette</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="color palette">
            <h2>Snowy Tundra</h2>
            <h4 id="sky-blue" class="color"> #8ACDEA </h4>
            <h4 id="Dim-Grey" class="color"> #746D75 </h4>
            <h4 id="Lavender-Mist" class="color"> #EDE6F2 </h4>
        </div>
        <div class="color palette">
            <h2>Layered lavender cake</h2>
            <h4 id="pink-orchid" class="color"> #E5BEED </h4>
            <h4 id="soft-periwinkle" class="color"> #9593D9 </h4>
            <h4 id="wisteria-blue" class="color"> #7C90DB </h4>
        </div>
        <div class="color palette">
            <h2>Mother Earth</h2>
            <h4 id="Espresso" class="color"> #502419 </h4>
            <h4 id="Sage-green" class="color"> #7EA172 </h4>
            <h4 id="Dry-sage" class="color"> #C7CB85 </h4>
        </div>
    </body>
</html>
